base64:
  bestFor:
    - "将 PNG、JPG、WebP、SVG、GIF 或 BMP 图片转换为 Base64 字符串。"
    - "粘贴 Base64 图片文本并预览还原后的图片。"
    - "复制图片 Data URL，用于 CSS、HTML、文档或测试数据。"
  steps:
    - "把图片拖入左侧区域，生成 Base64 Data URL。"
    - "把 Base64 文本粘贴到右侧区域，预览解码后的图片。"
    - "确认结果后复制编码或下载还原图片。"
  privacy: "Base64 编码和解码都在浏览器本地完成，TUXIA 不会把图片或粘贴的 Base64 文本上传到服务器。"
online:
  bestFor:
    - "使用你自己的 ImgBB API Key 上传图片。"
    - "生成可复制、可分享的公开图片链接。"
    - "保持上传路径透明：浏览器直接请求 ImgBB，不经过 TUXIA 服务器。"
  steps:
    - "在设置区域填写你的 ImgBB API Key。"
    - "选择图片并在页面中预览文件信息。"
    - "点击上传后复制返回的图片链接。"
  privacy: "这是唯一会把图片发送到第三方的工具。只有你点击上传后，浏览器才会使用你的 API Key 直接把图片发送到 ImgBB。"
qrcode-gen:
  bestFor:
    - "把网址、文本或短消息生成二维码。"
    - "自定义二维码尺寸、颜色、样式和容错等级。"
    - "导出 PNG 或 SVG，用于网页、印刷和运营物料。"
  steps:
    - "输入需要编码的文本或链接。"
    - "调整尺寸、容错等级、颜色、样式和可选 Logo。"
    - "预览二维码并选择 PNG 或 SVG 下载。"
  privacy: "二维码生成在浏览器本地完成，你输入的文本不会发送到 TUXIA 服务器。"
qrcode-dec:
  bestFor:
    - "识别截图、下载图片或照片里的二维码。"
    - "打开二维码链接前先查看真实内容。"
    - "复制识别出的文本，方便记录、排查或分享。"
  steps:
    - "上传清晰的二维码图片。"
    - "等待浏览器识别并显示二维码内容。"
    - "确认内容后复制结果或打开链接。"
  privacy: "二维码识别在浏览器本地完成，图片和识别结果不会上传到 TUXIA 服务器。"
compress:
  bestFor:
    - "在上传网站前减小 JPG、PNG 和 WebP 图片体积。"
    - "通过原图和压缩后对比检查画质变化。"
    - "根据使用场景选择 PNG、JPG、WebP 或 SVG 导出。"
  steps:
    - "上传 JPG、PNG 或 WebP 图片。"
    - "移动质量滑块，并查看压缩前后对比。"
    - "选择导出格式并下载压缩后的图片。"
  privacy: "图片压缩使用浏览器 Canvas 能力在本地完成，所选图片不会上传到 TUXIA 服务器。"
convert:
  bestFor:
    - "将 PNG 转 JPG、JPG 转 WebP、WebP 转 PNG 或 BMP 转 PNG。"
    - "为网页、文档、邮件或素材交付准备合适图片格式。"
    - "导出前先预览源图片。"
  steps:
    - "上传浏览器支持的图片文件。"
    - "选择目标导出格式。"
    - "预览确认后下载转换后的文件。"
  privacy: "格式转换在浏览器本地完成，TUXIA 不会把图片上传到后端服务。"
resize:
  bestFor:
    - "上传或发送前缩小大尺寸照片。"
    - "制作缩略图、头像和商品图变体。"
    - "按精确宽高或百分比缩放图片。"
  steps:
    - "上传图片并查看原始尺寸。"
    - "输入目标宽高，或选择快速缩放比例。"
    - "预览调整后的结果并下载。"
  privacy: "尺寸调整通过浏览器 Canvas 在本地完成，所选图片不会上传到 TUXIA 服务器。"
crop:
  bestFor:
    - "裁剪截图、照片、头像和商品图。"
    - "使用 1:1、4:3、16:9、3:4、9:16 等常用比例。"
    - "旋转图片并在导出前预览裁剪结果。"
  steps:
    - "上传图片并选择裁剪比例。"
    - "在画布上拖动或调整裁剪区域。"
    - "预览裁剪结果并下载图片。"
  privacy: "图片裁剪在浏览器本地完成，TUXIA 不会上传你的图片。"
watermark:
  bestFor:
    - "添加品牌文字、作者名称、草稿标记或版权说明。"
    - "应用单个水印、多行水印或满屏重复水印。"
    - "使用文字水印或上传小尺寸图片水印。"
  steps:
    - "上传需要添加水印的图片。"
    - "输入水印文字，或选择图片水印。"
    - "调整排列、字号、透明度、旋转、颜色并下载。"
  privacy: "水印处理在浏览器本地完成，所选图片不会上传到 TUXIA 服务器。"
retouch:
  bestFor:
    - "用马赛克遮挡隐私区域。"
    - "对小范围视觉瑕疵做轻量修复。"
    - "导出不含敏感局部信息的分享版本。"
  steps:
    - "上传图片并选择局部擦除或马赛克模式。"
    - "调整画笔大小和强度，在目标区域涂抹。"
    - "预览结果并下载处理后的图片。"
  privacy: "局部擦除和马赛克都在浏览器本地完成，所选图片不会上传到 TUXIA 服务器。"
palette:
  bestFor:
    - "从商品图、截图或设计稿中提取主色。"
    - "在图片预览上悬停读取实时颜色。"
    - "复制 HEX、RGB、HSL 或 CSS 变量格式。"
  steps:
    - "上传图片并生成配色板。"
    - "在预览图上移动鼠标，查看当前位置颜色。"
    - "切换颜色格式，复制单个颜色或整组配色。"
  privacy: "取色和配色提取都在浏览器本地完成，TUXIA 不会上传你的图片。"
exif:
  bestFor:
    - "查看 JPEG 照片中的相机和拍摄参数。"
    - "检查图片尺寸和基础元数据。"
    - "发布前确认照片是否包含 GPS 位置信息。"
  steps:
    - "上传 JPEG 照片或浏览器支持的图片文件。"
    - "查看图片预览和提取到的元数据字段。"
    - "根据结果判断是否需要另行移除敏感元数据。"
  privacy: "EXIF 读取在浏览器本地完成，TUXIA 不会上传你的照片。"
