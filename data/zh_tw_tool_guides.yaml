base64:
  bestFor:
    - "將 PNG、JPG、WebP、SVG、GIF 或 BMP 圖片轉換為 Base64 字串。"
    - "貼上 Base64 圖片文字並預覽還原後的圖片。"
    - "複製圖片 Data URL，用於 CSS、HTML、文件或測試資料。"
  steps:
    - "把圖片拖入左側區域，產生 Base64 Data URL。"
    - "把 Base64 文字貼到右側區域，預覽解碼後的圖片。"
    - "確認結果後複製編碼或下載還原圖片。"
  privacy: "Base64 編碼和解碼都在瀏覽器本機完成，TUXIA 不會把圖片或貼上的 Base64 文字上傳到伺服器。"
online:
  bestFor:
    - "使用你自己的 ImgBB API Key 上傳圖片。"
    - "產生可複製、可分享的公開圖片連結。"
    - "保持上傳路徑透明：瀏覽器直接請求 ImgBB，不經過 TUXIA 伺服器。"
  steps:
    - "在設定區域填寫你的 ImgBB API Key。"
    - "選擇圖片並在頁面中預覽檔案資訊。"
    - "點擊上傳後複製返回的圖片連結。"
  privacy: "這是唯一會把圖片傳送到第三方的工具。只有你點擊上傳後，瀏覽器才會使用你的 API Key 直接把圖片傳送到 ImgBB。"
qrcode-gen:
  bestFor:
    - "把網址、文字或短訊息產生 QR Code。"
    - "自訂 QR Code 尺寸、顏色、樣式和容錯等級。"
    - "匯出 PNG 或 SVG，用於網站、印刷和營運素材。"
  steps:
    - "輸入需要編碼的文字或連結。"
    - "調整尺寸、容錯等級、顏色、樣式和可選 Logo。"
    - "預覽 QR Code 並選擇 PNG 或 SVG 下載。"
  privacy: "QR Code 產生在瀏覽器本機完成，你輸入的文字不會傳送到 TUXIA 伺服器。"
qrcode-dec:
  bestFor:
    - "識別截圖、下載圖片或照片裡的 QR Code。"
    - "開啟 QR Code 連結前先查看真實內容。"
    - "複製識別出的文字，方便記錄、排查或分享。"
  steps:
    - "上傳清晰的 QR Code 圖片。"
    - "等待瀏覽器識別並顯示 QR Code 內容。"
    - "確認內容後複製結果或開啟連結。"
  privacy: "QR Code 識別在瀏覽器本機完成，圖片和識別結果不會上傳到 TUXIA 伺服器。"
compress:
  bestFor:
    - "在上傳網站前減少 JPG、PNG 和 WebP 圖片大小。"
    - "透過原圖和壓縮後對比檢查畫質變化。"
    - "依照使用情境選擇 PNG、JPG、WebP 或 SVG 匯出。"
  steps:
    - "上傳 JPG、PNG 或 WebP 圖片。"
    - "移動品質滑桿，並查看壓縮前後對比。"
    - "選擇匯出格式並下載壓縮後的圖片。"
  privacy: "圖片壓縮使用瀏覽器 Canvas 能力在本機完成，所選圖片不會上傳到 TUXIA 伺服器。"
convert:
  bestFor:
    - "將 PNG 轉 JPG、JPG 轉 WebP、WebP 轉 PNG 或 BMP 轉 PNG。"
    - "為網站、文件、郵件或素材交付準備合適圖片格式。"
    - "匯出前先預覽來源圖片。"
  steps:
    - "上傳瀏覽器支援的圖片檔案。"
    - "選擇目標匯出格式。"
    - "預覽確認後下載轉換後的檔案。"
  privacy: "格式轉換在瀏覽器本機完成，TUXIA 不會把圖片上傳到後端服務。"
resize:
  bestFor:
    - "上傳或傳送前縮小大尺寸照片。"
    - "製作縮圖、頭像和商品圖變體。"
    - "按精確寬高或百分比縮放圖片。"
  steps:
    - "上傳圖片並查看原始尺寸。"
    - "輸入目標寬高，或選擇快速縮放比例。"
    - "預覽調整後的結果並下載。"
  privacy: "尺寸調整透過瀏覽器 Canvas 在本機完成，所選圖片不會上傳到 TUXIA 伺服器。"
crop:
  bestFor:
    - "裁切截圖、照片、頭像和商品圖。"
    - "使用 1:1、4:3、16:9、3:4、9:16 等常用比例。"
    - "旋轉圖片並在匯出前預覽裁切結果。"
  steps:
    - "上傳圖片並選擇裁切比例。"
    - "在畫布上拖動或調整裁切區域。"
    - "預覽裁切結果並下載圖片。"
  privacy: "圖片裁切在瀏覽器本機完成，TUXIA 不會上傳你的圖片。"
watermark:
  bestFor:
    - "加入品牌文字、作者名稱、草稿標記或版權說明。"
    - "套用單個浮水印、多行浮水印或滿版重複浮水印。"
    - "使用文字浮水印或上傳小尺寸圖片浮水印。"
  steps:
    - "上傳需要加入浮水印的圖片。"
    - "輸入浮水印文字，或選擇圖片浮水印。"
    - "調整排列、字號、透明度、旋轉、顏色並下載。"
  privacy: "浮水印處理在瀏覽器本機完成，所選圖片不會上傳到 TUXIA 伺服器。"
retouch:
  bestFor:
    - "用馬賽克遮擋隱私區域。"
    - "對小範圍視覺瑕疵做輕量修復。"
    - "匯出不含敏感局部資訊的分享版本。"
  steps:
    - "上傳圖片並選擇局部擦除或馬賽克模式。"
    - "調整筆刷大小和強度，在目標區域塗抹。"
    - "預覽結果並下載處理後的圖片。"
  privacy: "局部擦除和馬賽克都在瀏覽器本機完成，所選圖片不會上傳到 TUXIA 伺服器。"
palette:
  bestFor:
    - "從商品圖、截圖或設計稿中擷取主色。"
    - "在圖片預覽上懸停讀取即時顏色。"
    - "複製 HEX、RGB、HSL 或 CSS 變數格式。"
  steps:
    - "上傳圖片並產生配色板。"
    - "在預覽圖上移動滑鼠，查看目前位置顏色。"
    - "切換顏色格式，複製單個顏色或整組配色。"
  privacy: "取色和配色擷取都在瀏覽器本機完成，TUXIA 不會上傳你的圖片。"
exif:
  bestFor:
    - "查看 JPEG 照片中的相機和拍攝參數。"
    - "檢查圖片尺寸和基礎中繼資料。"
    - "發布前確認照片是否包含 GPS 位置資訊。"
  steps:
    - "上傳 JPEG 照片或瀏覽器支援的圖片檔案。"
    - "查看圖片預覽和擷取到的中繼資料欄位。"
    - "依照結果判斷是否需要另行移除敏感中繼資料。"
  privacy: "EXIF 讀取在瀏覽器本機完成，TUXIA 不會上傳你的照片。"
