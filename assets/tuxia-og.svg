<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">TUXIA online image toolbox</title>
  <desc id="desc">TUXIA provides image compression, conversion, cropping, Base64 tools, QR codes, color extraction, and EXIF viewing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="72" width="1056" height="486" rx="36" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
  <g transform="translate(132 150)">
    <rect width="116" height="116" rx="26" fill="url(#brand)"/>
    <rect x="28" y="34" width="60" height="48" rx="10" fill="#ffffff"/>
    <circle cx="48" cy="54" r="8" fill="#2563eb"/>
    <path d="M36 75l18-18 13 13 8-8 17 17H36z" fill="#14b8a6"/>
  </g>
  <text x="132" y="350" fill="#111827" font-family="Arial, sans-serif" font-size="86" font-weight="800">TUXIA</text>
  <text x="132" y="430" fill="#4b5563" font-family="Arial, sans-serif" font-size="34">Online image tools: compress, convert, crop, QR, color, EXIF</text>
  <text x="132" y="488" fill="#6b7280" font-family="Arial, sans-serif" font-size="24">Most tools run locally in your browser. Fast, private, and install-free.</text>
</svg>
